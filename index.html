<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Avatar Video Generator</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #060d18;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 20px;
      padding: 32px;
    }
    h1 { margin: 0 0 8px; font-size: 26px; }
    p { color: #94a3b8; line-height: 1.5; margin: 0 0 8px; }
    label {
      display: block;
      margin: 16px 0 6px;
      font-size: 13px;
      font-weight: 700;
      color: #64748b;
    }
    input, textarea, select {
      width: 100%;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
      color: #f8fafc;
      padding: 12px;
      font: inherit;
    }
    textarea { min-height: 120px; resize: vertical; }
    button {
      margin-top: 20px;
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .status { margin-top: 12px; font-size: 13px; color: #94a3b8; min-height: 20px; }
    .msg {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      display: none;
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .msg.show { display: block; }
    .success { background: #052e1644; border: 1px solid #16a34a55; color: #86efac; }
    .error { background: #450a0a44; border: 1px solid #ef444455; color: #fca5a5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>AI Avatar Video Generator</h1>
    <p>Upload portrait + audio. Files go to our API first (no 413 error), then workflow creates your video task.</p>

    <form id="form">
      <label for="email">Email *</label>
      <input id="email" type="email" required placeholder="you@example.com">

      <label for="portrait">Portrait Image *</label>
      <input id="portrait" type="file" accept="image/*" required>

      <label for="audio">Audio File *</label>
      <input id="audio" type="file" accept=".mp3,.wav,.m4a,.aac,.ogg,audio/*" required>

      <label for="prompt">Video Prompt *</label>
      <textarea id="prompt" required>Create a realistic AI avatar video.

Input:
- One front-facing portrait image of a person.
- One audio file containing speech.

Requirements:
- Keep the person's identity and facial features unchanged.
- Synchronize lip movements accurately with the audio.
- Preserve natural eye blinking and subtle facial expressions.
- Do not alter clothing or background.
- Export as an MP4 video in the highest available quality.</textarea>

      <label for="resolution">Resolution *</label>
      <select id="resolution">
        <option value="480p">480p</option>
        <option value="720p">720p</option>
      </select>

      <button id="btn" type="submit">Generate Avatar Video</button>
      <div id="status" class="status"></div>
    </form>

    <div id="ok" class="msg success"></div>
    <div id="err" class="msg error"></div>
  </div>

  <script>
    const UPLOAD_API = 'https://klink-api-five.vercel.app/api/avatar/upload';
    const N8N_WEBHOOK = 'https://muhammadumersheraz2000.socioglory.com/webhook/kie-ai-avatar-submit';
    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const statusEl = document.getElementById('status');
    const ok = document.getElementById('ok');
    const err = document.getElementById('err');

    function setStatus(text) {
      statusEl.textContent = text || '';
    }

    async function fileToBase64(file) {
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      return String(dataUrl).split(',')[1];
    }

    async function compressImage(file) {
      if (file.size < 400 * 1024) return file;
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      const img = await new Promise((resolve, reject) => {
        const el = new Image();
        el.onload = () => resolve(el);
        el.onerror = reject;
        el.src = dataUrl;
      });
      const maxW = 1024;
      const scale = Math.min(1, maxW / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', 0.85));
      if (!blob) return file;
      return new File([blob], 'portrait.jpg', { type: 'image/jpeg' });
    }

    async function uploadFile(file, uploadPath) {
      const file_base64 = await fileToBase64(file);
      const res = await fetch(UPLOAD_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          file_base64,
          filename: file.name,
          mimeType: file.type || 'application/octet-stream',
          uploadPath,
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.code !== 200 || !data.data?.url) {
        throw new Error(data.msg || 'Upload failed');
      }
      return data.data.url;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      ok.classList.remove('show');
      err.classList.remove('show');
      btn.disabled = true;

      try {
        let portrait = document.getElementById('portrait').files[0];
        const audio = document.getElementById('audio').files[0];
        if (!portrait || !audio) throw new Error('Portrait and audio are required.');

        setStatus('Step 1/3: Compressing portrait...');
        portrait = await compressImage(portrait);

        setStatus('Step 2/3: Uploading portrait via our API...');
        const image_url = await uploadFile(portrait, 'images/user-uploads');

        setStatus('Step 2/3: Uploading audio via our API...');
        const audio_url = await uploadFile(audio, 'audio/user-uploads');

        setStatus('Step 3/3: Creating avatar task (our API + workflow)...');
        const payload = {
          email: document.getElementById('email').value.trim(),
          image_url,
          audio_url,
          prompt: document.getElementById('prompt').value.trim(),
          resolution: document.getElementById('resolution').value,
        };

        const res = await fetch(N8N_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json().catch(() => ({}));

        if (!res.ok || (data.code && data.code !== 200)) {
          const failMsg = data.formatted_error_text || data.msg || data.error_message || data.error || 'Task creation failed';
          throw new Error(failMsg);
        }

        const taskId = data?.data?.taskId || data?.task_id;
        ok.textContent = `SUCCESS\n\nTask ID: ${taskId || '—'}\nEmail: ${payload.email}\n\nYou will receive the video link by email when ready.`;
        ok.classList.add('show');
        setStatus('Done.');
      } catch (error) {
        err.textContent = error.message || 'Something went wrong.';
        err.classList.add('show');
        setStatus('');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate Avatar Video';
      }
    });
  </script>
</body>
</html>
