<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kling AI Avatar Generator</title>
  <meta name="description" content="Upload a portrait and audio to generate a Kling AI lip-sync avatar video.">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at 20% 0%, #1e3a8a33, transparent 40%),
        radial-gradient(circle at 80% 10%, #7c3aed33, transparent 38%), #060d18;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { color: #94a3b8; line-height: 1.6; }
    .hint { font-size: 13px; color: #64748b; margin-top: 4px; }
    label {
      display: block;
      margin: 18px 0 8px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #64748b;
    }
    input[type="file"], textarea {
      width: 100%;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
      color: #f8fafc;
      padding: 12px 14px;
    }
    textarea { min-height: 80px; resize: vertical; }
    button {
      margin-top: 24px;
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 15px 20px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: 0 12px 30px rgba(37, 99, 235, 0.35);
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      display: none;
      line-height: 1.6;
      font-size: 14px;
    }
    .msg.show { display: block; }
    .success { background: #052e1644; border: 1px solid #16a34a55; color: #86efac; }
    .error { background: #450a0a44; border: 1px solid #ef444455; color: #fca5a5; }
    .preview { margin-top: 16px; }
    video { width: 100%; border-radius: 12px; margin-top: 12px; background: #000; }
    a { color: #60a5fa; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Kling AI Avatar</h1>
    <p>Upload a portrait image and audio file to generate a lip-sync avatar video.</p>
    <p class="hint">Tip: use a clear face photo and audio between 5–60 seconds. Large images are auto-compressed.</p>

    <form id="uploadForm">
      <label for="portrait">Portrait Image</label>
      <input id="portrait" name="portrait" type="file" accept="image/*" required>
      <p class="hint">JPG or PNG, ideally under 5 MB</p>

      <label for="audio">Audio File</label>
      <input id="audio" name="audio" type="file" accept="audio/*" required>
      <p class="hint">MP3 or WAV, 2–60 seconds recommended</p>

      <label for="prompt">Prompt (optional)</label>
      <textarea id="prompt" name="prompt" placeholder="Optional style prompt. Default: .">.</textarea>

      <button id="submitBtn" type="submit">Generate Avatar Video</button>
    </form>

    <div id="successMsg" class="msg success"></div>
    <div id="errorMsg" class="msg error"></div>
    <div id="preview" class="preview"></div>
  </div>

  <script>
    const API_URL = '/api/generate';
    const MAX_AUDIO_MB = 15;
    const form = document.getElementById('uploadForm');
    const submitBtn = document.getElementById('submitBtn');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');
    const preview = document.getElementById('preview');

    function hideMessages() {
      successMsg.classList.remove('show');
      errorMsg.classList.remove('show');
      preview.innerHTML = '';
    }

    function formatMb(bytes) {
      return (bytes / (1024 * 1024)).toFixed(1);
    }

    async function compressImage(file, maxWidth = 1280, quality = 0.85) {
      if (!file.type.startsWith('image/')) return file;
      if (file.size < 800 * 1024) return file;

      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      const img = await new Promise((resolve, reject) => {
        const el = new Image();
        el.onload = () => resolve(el);
        el.onerror = reject;
        el.src = dataUrl;
      });

      const scale = Math.min(1, maxWidth / img.width);
      const width = Math.round(img.width * scale);
      const height = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);

      const blob = await new Promise((resolve) => {
        canvas.toBlob(resolve, 'image/jpeg', quality);
      });

      if (!blob || blob.size >= file.size) return file;
      return new File([blob], file.name.replace(/\.\w+$/, '.jpg'), { type: 'image/jpeg' });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      let portrait = document.getElementById('portrait').files[0];
      const audio = document.getElementById('audio').files[0];
      const prompt = document.getElementById('prompt').value || '.';

      if (!portrait || !audio) {
        errorMsg.textContent = 'Please select both portrait image and audio file.';
        errorMsg.classList.add('show');
        return;
      }

      if (audio.size > MAX_AUDIO_MB * 1024 * 1024) {
        errorMsg.textContent = 'Audio is too large (' + formatMb(audio.size) + ' MB). Please use a clip under ' + MAX_AUDIO_MB + ' MB or trim the audio.';
        errorMsg.classList.add('show');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Preparing upload...';

      try {
        portrait = await compressImage(portrait);

        const formData = new FormData();
        formData.append('portrait', portrait);
        formData.append('audio', audio);
        formData.append('prompt', prompt);

        submitBtn.textContent = 'Generating... this may take a few minutes';

        const res = await fetch(API_URL, { method: 'POST', body: formData });
        const data = await res.json().catch(() => ({}));

        if (!res.ok || !data.success || !data.video_url) {
          let msg = data.error || data.message || 'Avatar generation failed';
          if (res.status === 413) {
            msg = 'Files are too large for upload. Try a smaller image or shorter audio clip.';
          } else if (res.status === 500 && String(msg).includes('FAL_API_KEY')) {
            msg = 'Server setup incomplete: FAL_API_KEY must be added in Vercel Environment Variables.';
          }
          throw new Error(msg);
        }

        successMsg.innerHTML = 'Video generated successfully.<br><a href="' + data.video_url + '" target="_blank" rel="noopener">Download video</a>';
        successMsg.classList.add('show');
        preview.innerHTML = '<video controls src="' + data.video_url + '"></video>';
      } catch (err) {
        errorMsg.textContent = err.message || 'Something went wrong. Please try again.';
        errorMsg.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Generate Avatar Video';
      }
    });
  </script>
</body>
</html>
